# =============================================================================
# Pre-commit hook configuration for memcomp-bench
# Docs: https://pre-commit.com
#
# All tunables are grouped here for easy adjustment:
#   - Coverage threshold  → coverage-gate args (--cov-fail-under)
#   - Max file length     → max-file-length entry (MAX=500)
#   - Max function length → max-function-length entry (--max=65)
#   - Max file size       → check-added-large-files args (--maxkb)
#
# Run `make hooks-run` to execute all hooks against the full repo.
# =============================================================================

default_language_version:
  python: python3

exclude: "^output/"

repos:
  # ===========================================================================
  # 1. Built-in sanity checks
  # ===========================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
        exclude: ^\.vscode/
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: debug-statements
      - id: check-ast
      - id: check-symlinks

  # ===========================================================================
  # 2. Ruff — fast linter + formatter (reads config from pyproject.toml)
  # ===========================================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # ===========================================================================
  # 3. Local project-specific hooks (cheap checks first, expensive last)
  # ===========================================================================
  - repo: local
    hooks:
      # ---- Max file length (instant, runs after formatters have touched files)
      - id: max-file-length
        name: "check max file length (500 lines)"
        language: system
        entry: bash -c 'MAX=500; status=0; for f in $(git ls-files "*.py"); do n=$(wc -l < "$f"); if [ "$n" -gt "$MAX" ]; then echo "FAIL  $f ($n lines > $MAX)"; status=1; fi; done; exit $status'
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      # ---- Max function/method length (AST-based, ~P95 + margin)
      - id: max-function-length
        name: "check max function length (65 lines)"
        language: system
        entry: python3 scripts/check_function_length.py --max 65
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      # ---- Coverage gate (runs unit tests with coverage; subsumes tests-unit)
      - id: coverage-gate
        name: "check test coverage >= 87%"
        language: system
        entry: python3 -m pytest tests/unit/ --cov=memcomp_bench --cov-fail-under=87 -q --tb=short --no-header
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
